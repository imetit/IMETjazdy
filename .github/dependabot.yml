version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # Group patch-level updates together so we don't get spammed
      patches:
        patterns: ["*"]
        update-types: ["patch"]
      # Minor updates for core deps in one PR
      next-and-react:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "eslint-config-next"
        update-types: ["minor", "patch"]
      supabase:
        patterns:
          - "@supabase/*"
        update-types: ["minor", "patch"]
    # Security alerts always open as separate PRs regardless of grouping
    labels:
      - "dependencies"
      - "automated"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
